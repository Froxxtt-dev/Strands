            <div class="modal-carousel">
                <div class="modal-carousel-track" id="modal-track"></div>

            <div id="modal-product-body" class="product-modal-body"></div>

            <div class="modal-options">
                <div>
                    <p style="margin-bottom:6px; font-weight:600;">Quantity</p>
                    <div class="quantity-group">
                        <button type="button" onclick="changeQuantity(-1)">–</button>
                        <input type="text" id="modal-quantity" value="1" readonly>
                        <button type="button" onclick="changeQuantity(1)">+</button>
                    </div>
                </div>

                <div>
                    <p style="margin-bottom:6px; font-weight:600;">Color</p>
                    <div class="color-options" id="color-options"></div>
                </div>
            </div>

            <div id="modal-prices" style="padding: 0 1.5rem 1rem;"></div>

            <div class="modal-actions">
                <button onclick="addToCartFromModal('buy')" class="btn" style="flex:1;">Buy Now</button>
                <button onclick="addToCartFromModal('rent')" class="btn btn-rent" style="flex:1;">Rent Now</button>
            </div>
        </div>
    </div>

    <script src="js/products.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/main.js"></script>
    <script>
        let currentProduct = null;
        let currentQuantity = 1;
        let carouselInterval = null;

        function openProductModal(productId) {
            currentProduct = window.products.find(p => p.id === productId);
            if (!currentProduct) return;

            currentQuantity = 1;
            document.getElementById('modal-quantity').value = 1;

            const track = document.getElementById('modal-track');
            track.innerHTML = currentProduct.images.map(src => `
                <img src="${src}" alt="${currentProduct.name}">
            `).join('');

            const body = document.getElementById('modal-product-body');
            body.innerHTML = `
                <h2>${currentProduct.name}</h2>
                <p style="color:#aaa; line-height:1.5;">${currentProduct.description}</p>
                <div style="color:#d4af37; font-size:1.25rem; margin:10px 0;">
                    ${'★'.repeat(Math.floor(currentProduct.rating))} ${currentProduct.rating}
                </div>
            `;

            document.getElementById('modal-prices').innerHTML = `
                <p class="price-buy">Buy: <strong>GHS ${currentProduct.buyPrice}</strong></p>
                <p class="price-rent">Rent: <strong>GHS ${currentProduct.rentPrice}</strong> (${currentProduct.rentDays})</p>
            `;

            const colorDiv = document.getElementById('color-options');
            colorDiv.innerHTML = `
                <div class="color-dot selected" data-color="Natural Black" style="background:#111" onclick="selectColor(this)"></div>
                <div class="color-dot" data-color="Chestnut Brown" style="background:#8B4513" onclick="selectColor(this)"></div>
                <div class="color-dot" data-color="Honey Blonde" style="background:#F4A460" onclick="selectColor(this)"></div>
            `;

            document.getElementById('product-modal').hidden = false;
            document.body.style.overflow = 'hidden';

            startAutoCarousel();
        }

        function startAutoCarousel() {
            if (carouselInterval) clearInterval(carouselInterval);
            
            let index = 0;
            const track = document.getElementById('modal-track');
            
            carouselInterval = setInterval(() => {
                if (document.getElementById('product-modal').hidden) {
                    clearInterval(carouselInterval);
                    return;
                }
                index = (index + 1) % 3;
                track.style.transform = `translateX(-${index * 100}%)`;
            }, 3000);
        }

        function changeQuantity(delta) {
            currentQuantity = Math.max(1, currentQuantity + delta);
            document.getElementById('modal-quantity').value = currentQuantity;
        }

        function selectColor(el) {
            document.querySelectorAll('.color-dot').forEach(dot => dot.classList.remove('selected'));
            el.classList.add('selected');
        }

        function addToCartFromModal(type) {
            if (!currentProduct) return;
            const selectedDot = document.querySelector('.color-dot.selected');
            const selectedColor = selectedDot ? selectedDot.dataset.color : 'Natural Black';
            window.addToCart(currentProduct.id, type, { quantity: currentQuantity, color: selectedColor });
            alert(`${currentQuantity} × ${currentProduct.name} (${type.toUpperCase()}) added to cart!`);
            document.getElementById('product-modal').hidden = true;
            document.body.style.overflow = '';
            updateCartCount(); 
        }

        function closeProductModal() {
            const modal = document.getElementById('product-modal');
            if (modal) {
                modal.hidden = true;
                document.body.style.overflow = '';
                if (carouselInterval) clearInterval(carouselInterval);
            }
        }

        const shopGrid = document.getElementById('shop-grid');
        window.products.forEach((product) => {
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'shop-tile';
            btn.dataset.productId = String(product.id);
            btn.dataset.search = [product.name, product.description, product.keywords || ''].join(' ').toLowerCase();
            btn.innerHTML = window.shopTileHTML(product);
            btn.addEventListener('click', () => openProductModal(product.id));
            shopGrid.appendChild(btn);
        });

        document.querySelectorAll('[data-close-modal]').forEach(el => {
            el.addEventListener('click', closeProductModal);
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeProductModal();
        });

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('tab-shop').classList.add('active');

            function updateCartCount() {
                const countEl = document.getElementById('cart-count-tab');
                if (countEl) {
                    const cart = JSON.parse(localStorage.getItem('cart')) || [];
                    countEl.textContent = cart.reduce((sum, item) => sum + (Number(item.quantity) || 1), 0);
                }
            }

            updateCartCount();

            window.addEventListener('storage', updateCartCount);
        });
    </script>
</body>
</html>
